name: Deploy production

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: sst-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.16.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate deployment configuration
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_TO_ASSUME"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate web application
        run: |
          pnpm --filter @foos-rank/web check
          pnpm --filter @foos-rank/web lint
          pnpm --filter @foos-rank/web typecheck
          pnpm --filter @foos-rank/web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-sst-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: Deploy SST production stage
        run: pnpm exec sst deploy --stage production
